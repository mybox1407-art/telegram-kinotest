<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Случайный кинотест</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fff6ea;
      --paper: #fffdf7;
      --paper-2: #fff1dc;
      --paper-tv: #f2dec0;
      --paper-tv-dark: #e3c597;
      --screen: #fffaf4;
      --ink: #4b2d1f;
      --muted: #8f6147;
      --accent: #f48a2a;
      --accent-dark: #db6c12;
      --line: #6b4028;
      --success: #3d8a43;
      --danger: #b24a2a;
      --shadow: 0 10px 0 rgba(107, 64, 40, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 138, 42, 0.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 95, 0.22), transparent 18%),
        linear-gradient(180deg, #fff7ec 0%, #ffe8c9 100%);
      padding: 8px 14px 26px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card, .back-btn {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(0px, env(safe-area-inset-top));
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      font-weight: 800;
      color: var(--ink);
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      cursor: pointer;
      box-shadow:
        var(--shadow),
        inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .back-btn-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      display: block;
    }

    .back-btn-icon path,
    .back-btn-icon polyline {
      stroke: var(--ink);
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .back-btn:active,
    .tv-start-btn:active,
    .tv-random-btn:active,
    .option-btn:active,
    .result-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 0 rgba(107, 64, 40, 0.12);
    }

    .tv-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, var(--paper-tv) 0%, var(--paper-tv-dark) 100%);
      border-radius: 34px;
      box-shadow:
        0 12px 0 rgba(107, 64, 40, 0.14),
        0 22px 28px rgba(107, 64, 40, 0.08);
      position: relative;
      overflow: visible;
    }

    .tv-card::before,
    .tv-card::after {
      content: "";
      position: absolute;
      bottom: -14px;
      width: 58px;
      height: 10px;
      background: var(--line);
      border-radius: 999px;
      z-index: -1;
      opacity: 0.9;
    }

    .tv-card::before {
      left: 78px;
      transform: rotate(22deg);
    }

    .tv-card::after {
      right: 78px;
      transform: rotate(-22deg);
    }

    .tv-screen {
      position: relative;
      border: 3px solid var(--line);
      border-radius: 30px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.35),
        0 8px 0 rgba(107, 64, 40, 0.08);
      padding: 18px 14px 12px; /* было 24/16/18 – меньше отступы */
      min-height: 0;
    }

    .hand-note {
      position: relative;
      z-index: 1;
      font-family: 'Caveat', cursive;
      font-size: 32px;
      line-height: 1;
      color: var(--accent-dark);
      margin: 0 0 18px;
      transform: rotate(-2deg);
      text-align: center;
    }

    .quiz-title {
      position: relative;
      z-index: 1;
      margin: 4px 0 0; /* чуть ближе к прогрессу */
      font-size: 24px;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .quiz-description,
    .question-text,
    .result-text,
    .loading-text,
    .error-text {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
      font-weight: 500;
      text-align: center;
      text-justify: auto;
    }

    .quiz-meta {
      margin: 0 0 10px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;          /* было 10px */
      margin-bottom: 8px;/* было 14px – ближе к верху */
    }

    .progress-badge {
      padding: 7px 12px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: var(--paper-2);
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
    }

    .progress-bar {
      flex: 1;
      height: 12px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #f7e6cc;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      transition: width 220ms ease;
    }

    .doodle {
      position: relative;
      z-index: 1;
      margin-top: 10px;   /* было 18px – ближе к заголовку */
      border: 6px solid var(--paper-tv-dark);
      border-radius: 24px;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.18),
        0 3px 0 rgba(107, 64, 40, 0.10);
      overflow: hidden;
      background: #d9d1c5;
      aspect-ratio: 3 / 4;
      max-width: 260px;   /* было 280px – чуть компактнее по высоте */
      margin-left: auto;
      margin-right: auto;
    }

    .scene-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      filter: grayscale(1) contrast(1.04);
    }

    .doodle::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(0,0,0,0.06)),
        radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.08) 100%);
      mix-blend-mode: multiply;
    }

    .question-options {
      display: grid;
      gap: 8px;          /* было 10px */
      margin-top: 10px;  /* было 16px – ближе к фото */
    }

    .option-btn,
    .result-btn {
      width: 100%;
      border: 3px solid var(--line);
      border-radius: 18px;
      padding: 12px 12px; /* было 14px – чуть ниже по высоте строки */
      background: linear-gradient(180deg, #fff9ee 0%, #f6e2bd 100%);
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
      text-align: left;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.5);
      cursor: pointer;
    }

    .result-btn {
      margin-top: 16px;
      text-align: center;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fffaf5;
    }

    .result-stats {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .result-chip {
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--paper-2);
      text-align: center;
      font-size: 15px;
      font-weight: 800;
    }

    .loading-wrap,
    .error-wrap,
    .result-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100%;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 14px auto 0;
      border-radius: 50%;
      border: 4px solid rgba(107, 64, 40, 0.15);
      border-top-color: var(--accent-dark);
      animation: spin 0.9s linear infinite;
    }

    .error-text { 
      color: var(--danger);
      font-size: 13px;
      background: rgba(178, 74, 42, 0.1);
      padding: 10px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .retry-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fffaf5;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .retry-btn:active {
      transform: translateY(1px);
    }

    .tv-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border: 3px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .tv-start-btn,
    .tv-random-btn {
      border: 3px solid var(--line);
      color: #fffaf5;
      cursor: pointer;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.18);
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
    }

    .tv-start-btn {
      width: 100%;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .tv-random-btn {
      width: 56px;
      height: 44px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .tv-start-btn[disabled],
    .tv-random-btn[disabled],
    .option-btn[disabled],
    .result-btn[disabled],
    .retry-btn[disabled] {
      opacity: 0.65;
      cursor: wait;
    }

    .knobs {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }

    .knob {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #ffd79f 0%, #f0b05d 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.38);
      position: relative;
      flex: 0 0 auto;
    }

    .knob.small {
      width: 24px;
      height: 24px;
    }

    .knob::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 11px;
      border-radius: 999px;
      background: var(--line);
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .knob.small::after {
      height: 8px;
      top: 3px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .app { max-width: 100%; }
      .tv-screen { padding: 16px 10px 10px; }
      .doodle { max-width: 240px; }
      .tv-controls {
        grid-template-columns: minmax(0, 1fr) 52px auto;
        gap: 10px;
        padding: 12px 14px;
      }
      .tv-start-btn {
        min-height: 42px;
        font-size: 17px;
        padding: 0 14px;
      }
      .tv-random-btn {
        width: 52px;
        height: 42px;
        font-size: 20px;
      }
      .knobs { gap: 8px; }
      .knob { width: 30px; height: 30px; }
      .knob.small { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="back-btn" id="backButton" type="button" aria-label="Вернуться">
        <svg class="back-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 12H6"></path>
          <polyline points="11 7 6 12 11 17"></polyline>
        </svg>
        <span>Вернуться</span>
      </button>
    </div>

    <section class="card tv-card" aria-label="Карточка кинотеста">
      <div class="tv-screen" id="tvScreen"></div>

      <div class="tv-controls" id="tvControls">
        <button class="tv-start-btn" id="startButton" type="button">Начать</button>
        <button class="tv-random-btn" id="randomButton" type="button" aria-label="Случайный кинотест" title="Случайный кинотест">🎲</button>
        <div class="knobs" aria-hidden="true">
          <span class="knob"></span>
          <span class="knob small"></span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const QUIZ_API = 'https://n8n.kino-test.ru/webhook/random_quiz';
    const FALLBACK_SCENE = './movie_still.jpg';

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    const state = {
      screen: 'home',
      loading: false,
      title: 'Твой случайный кинотест',
      description: 'Подбираем для тебя случайный кинотест. Когда он загрузится, ты увидишь его заголовок и описание и сможешь начать или выбрать другой.',
      previewImage: FALLBACK_SCENE,
      quiz: null,
      currentQuestion: 0,
      answers: [],
      score: 0,
      error: ''
    };

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.MainButton.hide();

      tg.BackButton.onClick(() => {
        if (state.screen === 'quiz' || state.screen === 'result') {
          goHome();
          return;
        }
        if (window.history.length > 1) {
          window.history.back();
        } else {
          tg.close();
        }
      });
    }

    const tvScreen = document.getElementById('tvScreen');
    const tvControls = document.getElementById('tvControls');
    const randomButton = document.getElementById('randomButton');
    const startButton = document.getElementById('startButton');
    const backButton = document.getElementById('backButton');

    function safeHaptic(type, level) {
      if (!tg || !tg.HapticFeedback) return;
      try {
        if (type === 'impact') tg.HapticFeedback.impactOccurred(level);
        if (type === 'notification') tg.HapticFeedback.notificationOccurred(level);
      } catch (e) {
        console.warn('Haptic feedback failed:', e);
      }
    }

    async function fetchQuiz() {
      let response;
      try {
        response = await fetch(QUIZ_API, {
          method: 'POST',
          headers: { 
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          mode: 'cors',
          body: JSON.stringify({})
        });

        if (!response.ok) {
          const errorText = await response.text().catch(() => 'Неизвестная ошибка');
          console.error('Server error response:', errorText);
          throw new Error(`Сервер вернул ошибку (HTTP ${response.status})`);
        }

        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const text = await response.text();
          console.error('Non-JSON response:', text);
          throw new Error('Webhook вернул не JSON');
        }

        const data = await response.json();

        if (!data || !Array.isArray(data.questions) || !data.questions.length) {
          throw new Error('Webhook вернул пустой кинотест');
        }

        return data;

      } catch (error) {
        console.error('Fetch error details:', error);

        if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
          throw new Error('CORS ошибка. В n8n добавьте Response Headers:\nAccess-Control-Allow-Origin: *');
        }

        if (error.name === 'SyntaxError') {
          throw new Error('Ошибка парсинга JSON');
        }

        throw error;
      }
    }

    function setPreviewFromQuiz(quiz) {
      state.quiz = quiz;
      state.title = quiz.title || 'Твой случайный кинотест';
      state.description = quiz.description || 'Готово — тест подобран. Можно начинать.';
      state.previewImage = quiz.questions?.[0]?.image || FALLBACK_SCENE;
      state.error = '';
    }

    function resetRun() {
      state.currentQuestion = 0;
      state.answers = [];
      state.score = 0;
    }

    async function preloadQuiz() {
      if (state.loading) return;
      state.loading = true;
      state.error = '';
      render();

      try {
        const quiz = await fetchQuiz();
        setPreviewFromQuiz(quiz);
        safeHaptic('notification', 'success');
      } catch (error) {
        state.error = error.message || 'Ошибка загрузки кинотеста';
        console.error('Preload error:', error);
        safeHaptic('notification', 'error');
      } finally {
        state.loading = false;
        render();
      }
    }

    async function handleRandomQuiz() {
      if (state.loading) return;
      state.loading = true;
      state.error = '';
      render();

      try {
        const quiz = await fetchQuiz();
        setPreviewFromQuiz(quiz);
        state.screen = 'home';
        safeHaptic('impact', 'light');
      } catch (error) {
        state.error = error.message || 'Ошибка загрузки кинотеста';
        console.error('Random quiz error:', error);
        safeHaptic('notification', 'error');
      } finally {
        state.loading = false;
        render();
      }
    }

    async function handleStart() {
      if (state.loading) return;
      state.loading = true;
      state.error = '';
      render();

      try {
        if (!state.quiz) {
          const quiz = await fetchQuiz();
          setPreviewFromQuiz(quiz);
        }

        resetRun();
        state.screen = 'quiz';
        safeHaptic('notification', 'success');
      } catch (error) {
        state.error = error.message || 'Не удалось начать кинотест';
        console.error('Start error:', error);
        safeHaptic('notification', 'error');
      } finally {
        state.loading = false;
        render();
      }
    }

    function handleAnswer(index) {
      if (state.loading || state.screen !== 'quiz') return;

      const question = state.quiz.questions[state.currentQuestion];
      const selected = question.options[index];
      const isCorrect = !!selected.correct;

      state.answers.push({
        questionId: question.id,
        selectedIndex: index,
        selectedText: selected.text,
        correct: isCorrect
      });

      if (isCorrect) {
        state.score += 1;
        safeHaptic('notification', 'success');
      } else {
        safeHaptic('impact', 'medium');
      }

      const isLastQuestion = state.currentQuestion >= state.quiz.questions.length - 1;
      if (isLastQuestion) {
        state.screen = 'result';
        render();
        return;
      }

      state.currentQuestion += 1;
      render();
    }

    async function handleRestart() {
      state.quiz = null;
      await handleStart();
    }

    function goHome() {
      state.screen = 'home';
      state.error = '';
      state.loading = false;
      render();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderHome() {
      const errorBlock = state.error 
        ? `<p class="error-text">${escapeHtml(state.error)}</p><button class="retry-btn" onclick="preloadQuiz()">Повторить попытку</button>` 
        : '';

      if (state.loading) {
        tvScreen.innerHTML = `
          <div class="loading-wrap">
            <p class="hand-note">Твой случайный кинотест</p>
            <p class="loading-text">Подбираем для тебя кинотест и загружаем его описание...</p>
            <div class="spinner" aria-hidden="true"></div>
            ${errorBlock}
          </div>
        `;
      } else {
        tvScreen.innerHTML = `
          <p class="hand-note">Твой случайный кинотест</p>
          <h1 class="quiz-title">${escapeHtml(state.title)}</h1>
          <p class="quiz-description">${escapeHtml(state.description)}</p>

          <div class="doodle">
            <img
              class="scene-photo"
              src="${escapeHtml(state.previewImage)}"
              alt="Превью кинотеста"
              loading="eager"
              onerror="this.onerror=null;this.src='${FALLBACK_SCENE}'"
            />
          </div>
          ${errorBlock}
        `;
      }

      startButton.textContent = 'Начать';
      startButton.disabled = state.loading || !state.quiz;
      randomButton.disabled = state.loading;
      tvControls.style.display = 'grid';
    }

    function renderQuiz() {
      const question = state.quiz.questions[state.currentQuestion];
      const progress = ((state.currentQuestion + 1) / state.quiz.questions.length) * 100;

      tvScreen.innerHTML = `
        <div class="progress-row">
          <div class="progress-badge">Вопрос ${state.currentQuestion + 1} из ${state.quiz.questions.length}</div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-bar-fill" style="width:${progress}%"></div>
          </div>
        </div>

        <h2 class="quiz-title">${escapeHtml(question.question || 'Кто изображён на фото?')}</h2>

        <div class="doodle">
          <img
            class="scene-photo"
            src="${escapeHtml(question.image || FALLBACK_SCENE)}"
            alt="Вопрос ${state.currentQuestion + 1}"
            loading="eager"
            onerror="this.onerror=null;this.src='${FALLBACK_SCENE}'"
          />
        </div>

        <div class="question-options">
          ${question.options.map((option, index) => `
            <button class="option-btn" type="button" data-option-index="${index}">${escapeHtml(option.text)}</button>
          `).join('')}
        </div>
      `;

      tvScreen.querySelectorAll('[data-option-index]').forEach((button) => {
        button.addEventListener('click', () => handleAnswer(Number(button.dataset.optionIndex)));
      });

      tvControls.style.display = 'none';
    }

    function renderResult() {
      const total = state.quiz.questions.length;
      const percent = Math.round((state.score / total) * 100);
      let phrase = 'Хорошая попытка — следующий кинотест точно покорится тебе.';

      if (percent === 100) phrase = 'Идеально! Ты прошла этот кинотест без единой ошибки.';
      else if (percent >= 70) phrase = 'Очень сильный результат — ты отлично узнаёшь лица кино.';
      else if (percent >= 40) phrase = 'Неплохо! Ты уже хорошо ориентируешься, но можно ещё усилить результат.';

      tvScreen.innerHTML = `
        <div class="result-wrap">
          <p class="hand-note">Финал кинотеста</p>
          <h1 class="quiz-title">Результат</h1>
          <p class="result-text">${escapeHtml(phrase)}</p>

          <div class="result-stats">
            <div class="result-chip">Правильных ответов: ${state.score} из ${total}</div>
            <div class="result-chip">Точность: ${percent}%</div>
          </div>

          <button class="result-btn" id="restartButton" type="button">Пройти еще раз</button>
        </div>
      `;

      document.getElementById('restartButton').addEventListener('click', handleRestart);
      tvControls.style.display = 'none';
    }

    function render() {
      if (state.screen === 'home') {
        renderHome();
        return;
      }
      if (state.screen === 'quiz' && state.quiz) {
        renderQuiz();
        return;
      }
      if (state.screen === 'result' && state.quiz) {
        renderResult();
        return;
      }
      goHome();
    }

    randomButton.addEventListener('click', handleRandomQuiz);
    startButton.addEventListener('click', handleStart);

    backButton.addEventListener('click', () => {
      if (state.screen === 'quiz' || state.screen === 'result') {
        goHome();
        return;
      }
      if (window.history.length > 1) {
        window.history.back();
      } else if (tg) {
        tg.close();
      }
    });

    render();
    preloadQuiz();
  </script>
</body>
</html>
