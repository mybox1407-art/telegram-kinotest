<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Случайный кинотест</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff6ea;
      --paper: #fffdf7;
      --paper-2: #fff1dc;
      --paper-tv: #f2dec0;
      --paper-tv-dark: #e3c597;
      --screen: #fffaf4;
      --ink: #4b2d1f;
      --muted: #8f6147;
      --accent: #f48a2a;
      --accent-dark: #db6c12;
      --accent-soft: #ffd19d;
      --line: #6b4028;
      --shadow: 0 10px 0 rgba(107, 64, 40, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 138, 42, 0.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 95, 0.22), transparent 18%),
        linear-gradient(180deg, #fff7ec 0%, #ffe8c9 100%);
      padding: 18px 14px 34px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card, .back-btn, .cta, .bottom-btn {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
    }

    .scribble::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 2px dashed rgba(107, 64, 40, 0.18);
      border-radius: calc(var(--radius) - 8px);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(4px, env(safe-area-inset-top));
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      font-weight: 800;
      color: var(--ink);
      background: var(--paper-2);
      cursor: pointer;
    }

    .back-btn:active,
    .cta:active,
    .bottom-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 0 rgba(107, 64, 40, 0.12);
    }

    .tv-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, var(--paper-tv) 0%, var(--paper-tv-dark) 100%);
      border-radius: 34px;
      box-shadow:
        0 12px 0 rgba(107, 64, 40, 0.14),
        0 22px 28px rgba(107, 64, 40, 0.08);
      position: relative;
      overflow: visible;
    }

    .tv-card::before,
    .tv-card::after {
      content: "";
      position: absolute;
      bottom: -14px;
      width: 58px;
      height: 10px;
      background: var(--line);
      border-radius: 999px;
      z-index: -1;
      opacity: 0.9;
    }

    .tv-card::before {
      left: 78px;
      transform: rotate(22deg);
    }

    .tv-card::after {
      right: 78px;
      transform: rotate(-22deg);
    }

    .tv-screen {
      position: relative;
      border: 3px solid var(--line);
      border-radius: 30px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.35),
        0 8px 0 rgba(107, 64, 40, 0.08);
      padding: 24px 16px 18px;
      min-height: 380px;
    }

    .tv-screen::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 2px dashed rgba(107, 64, 40, 0.18);
      border-radius: 22px;
      pointer-events: none;
    }

    .hand-note {
      position: relative;
      z-index: 1;
      font-family: 'Caveat', cursive;
      font-size: 36px;
      line-height: 1;
      color: var(--accent-dark);
      margin: 0 0 18px;
      transform: rotate(-2deg);
      text-align: center;
    }

    .quiz-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .quiz-description {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
      text-align: justify;
      text-justify: inter-word;
    }

    .doodle {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      padding: 0;
      background: linear-gradient(180deg, #f3ece3 0%, #e5d8c8 100%);
      border: 3px solid rgba(107, 64, 40, 0.45);
      border-radius: 24px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25);
      overflow: hidden;
    }

    .doodle svg {
      width: 100%;
      height: auto;
      display: block;
      filter: grayscale(1) contrast(1.05);
    }

    .tv-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border: 3px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .speaker {
      height: 44px;
      border-radius: 16px;
      border: 2px solid rgba(107, 64, 40, 0.28);
      background:
        radial-gradient(circle, rgba(107,64,40,0.35) 18%, transparent 19%) 0 0 / 8px 8px,
        #edd8b5;
    }

    .knobs {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .knob {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #ffd79f 0%, #f0b05d 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.38);
      position: relative;
      flex: 0 0 auto;
    }

    .knob.small {
      width: 24px;
      height: 24px;
    }

    .knob::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 11px;
      border-radius: 999px;
      background: var(--line);
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .knob.small::after {
      height: 8px;
      top: 3px;
    }

    .cta {
      width: 100%;
      padding: 18px 20px;
      background: var(--accent);
      color: #fffaf5;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      cursor: pointer;
    }

    .cta-wrap {
      padding: 2px;
    }

    .bottom-box {
      margin-top: 4px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    .bottom-btn {
      width: 100%;
      padding: 16px 18px;
      background: var(--paper-2);
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="back-btn scribble" id="backButton" type="button" aria-label="Вернуться">
        <span>←</span>
        <span>Вернуться</span>
      </button>
    </div>

    <section class="card tv-card" aria-label="Карточка кинотеста">
      <div class="tv-screen">
        <p class="hand-note">Твой случайный кинотест</p>
        <h1 class="quiz-title" id="quizTitle">Увлекательный тест по актрисам Франции</h1>
        <p class="quiz-description" id="quizDescription">Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.</p>

        <div class="doodle cinema-scene">
          <svg viewBox="0 0 360 190" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="bgFade" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f6f1ea"/>
                <stop offset="100%" stop-color="#ddd3c6"/>
              </linearGradient>
              <linearGradient id="dressFade" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#fbfaf7"/>
                <stop offset="100%" stop-color="#c9c1b6"/>
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="360" height="190" rx="22" fill="url(#bgFade)"/>

            <path d="M0 150L360 150" stroke="#6B4028" stroke-width="3"/>
            <path d="M0 166C72 158 121 154 180 154C244 154 298 160 360 172" stroke="#6B4028" stroke-opacity="0.22" stroke-width="12" stroke-linecap="round"/>

            <path d="M236 0V150" stroke="#6B4028" stroke-opacity="0.18" stroke-width="4"/>
            <path d="M252 0V150" stroke="#6B4028" stroke-opacity="0.08" stroke-width="3"/>
            <path d="M236 18H252M236 44H252M236 70H252M236 96H252M236 122H252" stroke="#6B4028" stroke-opacity="0.2" stroke-width="3"/>

            <path d="M18 30C34 18 57 14 79 24C96 31 112 48 118 69" stroke="#6B4028" stroke-opacity="0.14" stroke-width="18" stroke-linecap="round"/>

            <g transform="translate(18 34)">
              <ellipse cx="62" cy="40" rx="30" ry="22" fill="#e9e2d9"/>
              <path d="M53 18C64 6 81 7 90 19C97 28 98 42 90 53C83 63 69 69 55 65C43 61 34 51 33 39C32 31 36 24 44 20Z" fill="#d8d0c6"/>
              <path d="M42 82C50 64 66 58 83 62C98 66 110 78 115 97L128 140H16L27 101C30 90 35 85 42 82Z" fill="#efebe4"/>
              <path d="M77 69L83 122" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>
              <path d="M69 98L31 126" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>
              <path d="M88 101L124 116" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>

              <g transform="translate(100 48)">
                <circle cx="24" cy="14" r="12" fill="#3d332d"/>
                <circle cx="44" cy="18" r="16" fill="#3d332d"/>
                <rect x="16" y="24" width="46" height="24" rx="4" fill="#3d332d"/>
                <path d="M62 30L84 26V46L62 42Z" fill="#3d332d"/>
                <rect x="8" y="42" width="10" height="20" rx="4" fill="#3d332d"/>
                <path d="M34 48V90" stroke="#3d332d" stroke-width="4" stroke-linecap="round"/>
                <path d="M34 90L14 136" stroke="#3d332d" stroke-width="4" stroke-linecap="round"/>
                <path d="M34 90L36 138" stroke="#3d332d" stroke-width="4" stroke-linecap="round"/>
                <path d="M34 90L56 136" stroke="#3d332d" stroke-width="4" stroke-linecap="round"/>
              </g>
            </g>

            <g transform="translate(250 30)">
              <ellipse cx="42" cy="32" rx="18" ry="20" fill="#e7ddd3"/>
              <path d="M24 30C26 14 38 6 53 12C65 18 69 31 64 43C59 56 45 62 31 58C22 55 18 44 24 30Z" fill="#efe7dc"/>
              <path d="M40 53C57 55 67 65 71 84C73 95 73 110 74 136H12C13 112 14 97 18 84C23 67 31 57 40 53Z" fill="url(#dressFade)"/>
              <path d="M18 78C7 96 4 110 2 138" stroke="#f1ece4" stroke-width="10" stroke-linecap="round"/>
              <path d="M66 79C79 95 85 112 88 140" stroke="#f1ece4" stroke-width="10" stroke-linecap="round"/>
              <path d="M40 53V138" stroke="#b9aea0" stroke-opacity="0.5" stroke-width="2"/>
              <path d="M29 138L23 150" stroke="#6B4028" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
              <path d="M58 138L64 150" stroke="#6B4028" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
            </g>

            <path d="M302 80H352" stroke="#6B4028" stroke-opacity="0.22" stroke-width="5" stroke-linecap="round"/>
            <path d="M306 95H350" stroke="#6B4028" stroke-opacity="0.16" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="tv-controls" aria-hidden="true">
        <div class="speaker"></div>
        <div class="knobs">
          <span class="knob"></span>
          <span class="knob small"></span>
        </div>
      </div>
    </section>

    <div class="cta-wrap">
      <button class="cta scribble" id="startButton" type="button">Начать</button>
    </div>

    <div class="bottom-box">
      <button class="bottom-btn scribble" id="randomButton" type="button">🎲 Случайный кинотест</button>
    </div>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.MainButton.hide();

      tg.BackButton.onClick(() => {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          tg.close();
        }
      });
    }

    const state = {
      title: 'Увлекательный тест по актрисам Франции',
      description: 'Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.'
    };

    const titleEl = document.getElementById('quizTitle');
    const descriptionEl = document.getElementById('quizDescription');
    const randomButton = document.getElementById('randomButton');
    const startButton = document.getElementById('startButton');
    const backButton = document.getElementById('backButton');

    function render() {
      titleEl.textContent = state.title;
      descriptionEl.textContent = state.description;

      if (tg) {
        tg.MainButton.hide();
      }
    }

    function getRandomLocalQuiz() {
      const variants = [
        {
          title: 'Увлекательный тест по актерам США',
          description: 'Проверь, насколько хорошо ты узнаешь главных звезд Голливуда по фильмам, эпохам и ролям.'
        },
        {
          title: 'Увлекательный тест по актрисам России',
          description: 'Вспомни ярких актрис российского кино и узнай, насколько хорошо ты чувствуешь отечественный экран.'
        },
        {
          title: 'Увлекательный тест по актерам Скандинавии',
          description: 'Холодный север, мощная фактура и узнаваемые лица — попробуй пройти этот короткий кинотест без ошибок.'
        },
        {
          title: 'Увлекательный тест по актрисам Франции',
          description: 'Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.'
        }
      ];
      return variants[Math.floor(Math.random() * variants.length)];
    }

    randomButton.addEventListener('click', () => {
      Object.assign(state, getRandomLocalQuiz());
      render();
      if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    });

    function startQuiz() {
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      if (tg) {
        tg.sendData(JSON.stringify({ action: 'start_random_quiz', title: state.title }));
      } else {
        alert('Старт теста: ' + state.title);
      }
    }

    startButton.addEventListener('click', startQuiz);

    backButton.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else if (tg) {
        tg.close();
      }
    });

    render();
  </script>
</body>
</html>
