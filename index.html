<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Случайный кинотест</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fff6ea;
      --paper: #fffdf7;
      --paper-2: #fff1dc;
      --paper-tv: #f2dec0;
      --paper-tv-dark: #e3c597;
      --screen: #fffaf4;
      --ink: #4b2d1f;
      --muted: #8f6147;
      --accent: #f48a2a;
      --accent-dark: #db6c12;
      --line: #6b4028;
      --frame-dark: #654321;
      --success: #3d8a43;
      --danger: #b24a2a;
      --shadow: 0 10px 0 rgba(107, 64, 40, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 138, 42, 0.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 95, 0.22), transparent 18%),
        linear-gradient(180deg, #fff7ec 0%, #ffe8c9 100%);
      padding: 8px 14px 26px;
      display: flex;
      flex-direction: column;
    }

    .app {
      width: 100%;
      max-width: 430px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card, .back-btn {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(0px, env(safe-area-inset-top));
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      font-weight: 800;
      color: var(--ink);
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      cursor: pointer;
      box-shadow:
        var(--shadow),
        inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .back-btn-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      display: block;
    }

    .back-btn-icon path,
    .back-btn-icon polyline {
      stroke: var(--ink);
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .back-btn:active,
    .tv-start-btn:active,
    .tv-random-btn:active,
    .option-btn:active,
    .result-btn:active,
    .account-btn:active,
    .modal-close:active,
    .tool-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 0 rgba(107, 64, 40, 0.12);
    }

    .tv-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, var(--paper-tv) 0%, var(--paper-tv-dark) 100%);
      border-radius: 34px;
      box-shadow:
        0 12px 0 rgba(107, 64, 40, 0.14),
        0 22px 28px rgba(107, 64, 40, 0.08);
      position: relative;
      overflow: visible;
    }

    .tv-card::before,
    .tv-card::after {
      content: "";
      position: absolute;
      bottom: -14px;
      width: 58px;
      height: 10px;
      background: var(--line);
      border-radius: 999px;
      z-index: -1;
      opacity: 0.9;
    }

    .tv-card::before {
      left: 78px;
      transform: rotate(22deg);
    }

    .tv-card::after {
      right: 78px;
      transform: rotate(-22deg);
    }

    .tv-screen {
      position: relative;
      border: 3px solid var(--line);
      border-radius: 30px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.35),
        0 8px 0 rgba(107, 64, 40, 0.08);
      padding: 12px 12px 8px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .account-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid var(--frame-dark);
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fffaf5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 6;
      font-size: 18px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.18);
      pointer-events: auto;
    }

    .account-btn span {
      transform: translateY(-1px);
      line-height: 1;
    }

    .hand-note {
      position: relative;
      z-index: 1;
      font-family: 'Caveat', cursive;
      font-size: 28px;
      line-height: 1;
      color: var(--accent-dark);
      margin: 0 0 14px;
      transform: rotate(-2deg);
      text-align: center;
    }

    .quiz-title {
      position: relative;
      z-index: 1;
      margin: 2px 0 0;
      font-size: 24px;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .quiz-description,
    .question-text,
    .result-text,
    .loading-text,
    .error-text {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
      font-weight: 500;
      text-align: center;
      text-justify: auto;
    }

    .result-text {
      font-size: 16px;
      line-height: 1.5;
      font-weight: 800;
    }

    .home-inner {
      margin-top: -4px;
    }

    .home-description {
      margin-bottom: 6px;
    }

    .quiz-meta {
      margin: 0 0 10px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
      padding-right: 40px;
    }

    .progress-badge {
      padding: 7px 12px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: var(--paper-2);
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
    }

    .progress-bar {
      flex: 1;
      height: 12px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #f7e6cc;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      transition: width 220ms ease;
    }

    .doodle {
      position: relative;
      z-index: 1;
      margin-top: 8px;
      border: 3px solid var(--frame-dark);
      border-radius: 24px;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.18),
        0 3px 0 rgba(107, 64, 40, 0.10);
      overflow: hidden;
      background: #d9d1c5;
      aspect-ratio: 3 / 4;
      max-width: 240px;
      margin-left: auto;
      margin-right: auto;
    }

    .home-doodle {
      margin-top: 2px;
      max-width: 220px;
    }

    .home-doodle--landscape,
    .question-doodle--landscape {
      aspect-ratio: 16 / 9;
      max-width: 320px;
    }

    .scene-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      filter: grayscale(1) contrast(1.04);
    }

    .scene-photo--landscape {
      object-fit: cover;
      object-position: center center;
    }

    .doodle::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(0,0,0,0.06)),
        radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.08) 100%);
      mix-blend-mode: multiply;
    }

    .question-options {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .option-btn,
    .result-btn {
      width: 100%;
      border: 3px solid var(--frame-dark);
      border-radius: 16px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #fff9ee 0%, #f6e2bd 100%);
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      text-align: left;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.5);
      cursor: pointer;
      pointer-events: auto;
      position: relative;
      z-index: 2;
    }

    .option-btn--image {
      padding: 0;
      overflow: hidden;
      display: block;
      min-height: 110px;
    }

    .option-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
      aspect-ratio: 3 / 4;
      filter: grayscale(1) contrast(1.04);
      pointer-events: none;
    }

    .question-options--images {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .question-options--images .option-btn--image {
      min-height: 128px;
    }

    .result-btn {
      margin-top: 16px;
      text-align: center;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fffaf5;
    }

    .result-stats {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .result-chip {
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--paper-2);
      text-align: center;
      font-size: 15px;
      font-weight: 800;
    }

    .loading-wrap,
    .error-wrap,
    .result-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100%;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 14px auto 0;
      border-radius: 50%;
      border: 4px solid rgba(107, 64, 40, 0.15);
      border-top-color: var(--accent-dark);
      animation: spin 0.9s linear infinite;
    }

    .error-text { 
      color: var(--danger);
      font-size: 13px;
      background: rgba(178, 74, 42, 0.1);
      padding: 10px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .retry-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fffaf5;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .retry-btn:active {
      transform: translateY(1px);
    }

    .tv-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border: 3px solid var(--frame-dark);
      border-radius: 22px;
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .tv-start-btn,
    .tv-random-btn {
      border: 3px solid var(--frame-dark);
      color: #fffaf5;
      cursor: pointer;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.18);
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      pointer-events: auto;
    }

    .tv-start-btn {
      width: 100%;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .tv-random-btn {
      width: 56px;
      height: 44px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .tv-start-btn[disabled],
    .tv-random-btn[disabled],
    .option-btn[disabled],
    .result-btn[disabled],
    .retry-btn[disabled] {
      opacity: 0.65;
      cursor: wait;
    }

    .knobs {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }

    .knob {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #ffd79f 0%, #f0b05d 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.38);
      position: relative;
      flex: 0 0 auto;
    }

    .knob.small {
      width: 24px;
      height: 24px;
    }

    .knob::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 11px;
      border-radius: 999px;
      background: var(--line);
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .knob.small::after {
      height: 8px;
      top: 3px;
    }

    .path-visual {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .path-card {
      position: relative;
      width: 280px;
      height: 120px;
      border-radius: 18px;
      background: var(--paper-2);
      border: 2px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      overflow: hidden;
      transition: transform 160ms ease-out;
    }

    .path-card--super { transform: translateY(-2px); }

    .path-start {
      position: absolute;
      left: 26px;
      top: 34px;
      width: 64px;
      height: 40px;
      border-radius: 14px;
      background: #f4c28f;
      border: 3px solid #6b4028;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4);
    }

    .path-start-line {
      position: absolute;
      top: 50%;
      left: 20%;
      right: 20%;
      height: 0;
      border-top: 3px solid #6b4028;
      transform: translateY(-50%);
    }

    .path-start-line::before,
    .path-start-line::after {
      content: "";
      position: absolute;
      top: -16px;
      bottom: -16px;
      width: 0;
      border-left: 3px solid #6b4028;
    }

    .path-start-line::before { left: 34%; }
    .path-start-line::after  { right: 34%; }

    .path-target {
      position: absolute;
      right: 32px;
      top: 26px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff7ee;
      border: 3px solid #6b4028;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .path-target-x {
      position: relative;
      width: 24px;
      height: 24px;
    }

    .path-target-x::before,
    .path-target-x::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100%;
      height: 3px;
      background: #f48a2a;
      border-radius: 999px;
      transform-origin: center;
    }

    .path-target-x::before { transform: translate(-50%, -50%) rotate(45deg); }
    .path-target-x::after  { transform: translate(-50%, -50%) rotate(-45deg); }

    .path-dots {
      position: absolute;
      left: 80px;
      right: 90px;
      top: 48px;
      height: 40px;
      pointer-events: none;
    }

    .path-dots span {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #6b4028;
      opacity: 0.9;
    }

    .path-dots span:nth-child(1) { left: 0%;   top: 18px; }
    .path-dots span:nth-child(2) { left: 18%;  top: 12px; }
    .path-dots span:nth-child(3) { left: 36%;  top: 8px;  }
    .path-dots span:nth-child(4) { left: 54%;  top: 10px; }
    .path-dots span:nth-child(5) { left: 72%;  top: 16px; }
    .path-dots span:nth-child(6) { left: 90%;  top: 22px; }

    .path-smile {
      position: absolute;
      left: 50%;
      bottom: 20px;
      width: 120px;
      height: 28px;
      border-radius: 0 0 80px 80px;
      border-bottom: 3px solid #6b4028;
      transform: translateX(-50%);
    }

    .path-card--super .path-smile {
      width: 140px;
      height: 34px;
      bottom: 18px;
      border-radius: 0 0 90px 90px;
    }

    .path-card--good .path-smile {
      width: 125px;
      height: 26px;
      bottom: 20px;
    }

    .path-card--ok .path-smile {
      width: 110px;
      height: 10px;
      bottom: 24px;
      border-radius: 0 0 40px 40px;
    }

    .path-card--sad .path-smile {
      top: 74px;
      bottom: auto;
      width: 110px;
      height: 20px;
      border-radius: 80px 80px 0 0;
      border-bottom: none;
      border-top: 3px solid #6b4028;
    }

    .path-card--fail .path-smile {
      top: 72px;
      bottom: auto;
      width: 130px;
      height: 26px;
      border-radius: 90px 90px 0 0;
      border-bottom: none;
      border-top: 3px solid #6b4028;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(64, 38, 24, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      border-radius: 28px;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #fffdf7 0%, #f8e8ca 100%);
      box-shadow: 0 18px 60px rgba(64, 38, 24, 0.28);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 3px solid var(--line);
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 800;
      color: var(--ink);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #fff7ec 0%, #f2d6aa 100%);
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.45);
      flex: 0 0 auto;
    }

    /* ===== НОВЫЕ СТИЛИ ПРОФИЛЯ ===== */
    .modal-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .profile-header {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #ffd79f 0%, #f0b05d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex: 0 0 auto;
    }

    .profile-meta {
      min-width: 0;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2px;
      color: var(--ink);
    }

    .profile-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .level-block {
      background: var(--paper-2);
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }

    .level-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .level-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
    }

    .level-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
    }

    .level-exp {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .stat-bar-container {
      height: 14px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #f7e6cc;
      overflow: hidden;
      margin-top: 4px;
    }

    .stat-bar-fill {
      height: 100%;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: 0 999px 999px 0;
      transition: width 0.3s ease;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--ink);
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .stats-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 800;
    }

    .stat-label { color: var(--ink); }
    .stat-count { color: var(--muted); }
    
    .reward-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--paper-2);
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 8px 12px;
    }

    .reward-icon {
      font-size: 20px;
      flex: 0 0 auto;
    }

    .reward-info {
      flex: 1;
    }

    .reward-name {
      font-size: 13px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .tools-grid {
      display: grid;
      gap: 8px;
    }

    .tool-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #fff9ee 0%, #f6e2bd 100%);
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .tool-count {
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .app { max-width: 100%; }
      .tv-screen { padding: 10px 10px 4px; }
      .doodle { max-width: 220px; }
      .home-doodle { max-width: 210px; }
      .home-doodle--landscape,
      .question-doodle--landscape { max-width: 100%; }
      .tv-controls {
        grid-template-columns: minmax(0, 1fr) 52px auto;
        gap: 10px;
        padding: 12px 14px;
      }
      .tv-start-btn {
        min-height: 42px;
        font-size: 17px;
        padding: 0 14px;
      }
      .tv-random-btn {
        width: 52px;
        height: 42px;
        font-size: 20px;
      }
      .knobs { gap: 8px; }
      .knob { width: 30px; height: 30px; }
      .knob.small { width: 22px; height: 22px; }
      .question-options--images { grid-template-columns: 1fr 1fr; }
      .modal { border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="back-btn" id="backButton" type="button" aria-label="Вернуться">
        <svg class="back-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 12H6"></path>
          <polyline points="11 7 6 12 11 17"></polyline>
        </svg>
        <span>Вернуться</span>
      </button>
    </div>

    <section class="card tv-card" aria-label="Карточка кинотеста">
      <div class="tv-screen" id="tvScreen"></div>

      <div class="tv-controls" id="tvControls">
        <button class="tv-start-btn" id="startButton" type="button">Начать</button>
        <button class="tv-random-btn" id="randomButton" type="button" aria-label="Случайный кинотест" title="Случайный кинотест">🎲</button>
        <div class="knobs" aria-hidden="true">
          <span class="knob"></span>
          <span class="knob small"></span>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="accountModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="accountModalTitle">
      <div class="modal-head">
        <h2 class="modal-title" id="accountModalTitle">Аккаунт</h2>
        <button class="modal-close" id="closeAccountModal" type="button" aria-label="Закрыть">×</button>
      </div>
      
      <div class="modal-body">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">🤖</div>
          <div class="profile-meta">
            <h3 class="profile-name" id="profileName">Пользователь</h3>
            <p class="profile-subtitle">Статистика и настройки профиля</p>
          </div>
        </div>

        <div class="level-block">
          <div class="level-header">
            <span class="level-title">ТЕКУЩИЙ УРОВЕНЬ</span>
            <span class="level-value">3</span>
          </div>
          <div class="stat-bar-container">
            <div class="stat-bar-fill" style="width: 65%;"></div>
          </div>
          <div class="level-exp" style="margin-top: 4px; text-align: right;">650 / 1000 XP</div>
        </div>

        <div>
          <h4 class="section-title">Точность по категориям</h4>
          <div class="stats-list">
            <div class="stat-item">
              <div class="stat-item-header">
                <span class="stat-label">Актёры и актрисы</span>
                <span class="stat-count">12 игр</span>
              </div>
              <div class="stat-bar-container">
                <div class="stat-bar-fill" style="width: 83%;"></div>
              </div>
            </div>
            <div class="stat-item">
              <div class="stat-item-header">
                <span class="stat-label">Кадры из фильмов</span>
                <span class="stat-count">7 игр</span>
              </div>
              <div class="stat-bar-container">
                <div class="stat-bar-fill" style="width: 61%;"></div>
              </div>
            </div>
            <div class="stat-item">
              <div class="stat-item-header">
                <span class="stat-label">Вопросы про кино</span>
                <span class="stat-count">19 игр</span>
              </div>
              <div class="stat-bar-container">
                <div class="stat-bar-fill" style="width: 74%;"></div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <h4 class="section-title">Награды</h4>
          <div class="stats-list">
            <div class="reward-item">
              <span class="reward-icon">🎞️</span>
              <div class="reward-info">
                <div class="reward-name">Бобины</div>
                <div class="stat-bar-container" style="height: 8px;">
                  <div class="stat-bar-fill" style="width: 40%;"></div>
                </div>
              </div>
            </div>
            <div class="reward-item">
              <span class="reward-icon">⭐</span>
              <div class="reward-info">
                <div class="reward-name">Звёзды</div>
                <div class="stat-bar-container" style="height: 8px;">
                  <div class="stat-bar-fill" style="width: 90%;"></div>
                </div>
              </div>
            </div>
            <div class="reward-item">
              <span class="reward-icon">🎫</span>
              <div class="reward-info">
                <div class="reward-name">Золотые билеты</div>
                <div class="stat-bar-container" style="height: 8px;">
                  <div class="stat-bar-fill" style="width: 15%;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <h4 class="section-title">Инструменты</h4>
          <div class="tools-grid">
            <button class="tool-btn" type="button">
              Монтажная резка (50/50)
              <span class="tool-count">3</span>
            </button>
            <button class="tool-btn" type="button">
              Второй дубль (повтор)
              <span class="tool-count">1</span>
            </button>
            <button class="tool-btn" type="button">
              Оскар (сразу выиграть)
              <span class="tool-count">0</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const QUIZ_API = 'https://n8n.kino-test.ru/webhook/random_quiz';
    const FALLBACK_SCENE = './movie_still.jpg';

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    const state = {
      screen: 'home',
      loading: false,
      title: '',
      description: '...',
      previewImage: FALLBACK_SCENE,
      quiz: null,
      currentQuestion: 0,
      answers: [],
      score: 0,
      error: '',
      account: {
        name: 'Пользователь',
        photo: null
      }
    };

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.MainButton.hide();

      if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        state.account.name = user.first_name || 'Пользователь';
        if (user.photo_url) {
          state.account.photo = user.photo_url;
        }
      }
    }

    const tvScreen = document.getElementById('tvScreen');
    const tvControls = document.getElementById('tvControls');
    const randomButton = document.getElementById('randomButton');
    const startButton = document.getElementById('startButton');
    const backButton = document.getElementById('backButton');
    const accountModal = document.getElementById('accountModal');

    const accountBtn = document.createElement('button');
    accountBtn.className = 'account-btn';
    accountBtn.type = 'button';
    accountBtn.innerHTML = '<span>👤</span>';
    accountBtn.setAttribute('aria-label', 'Аккаунт');
    accountBtn.title = 'Аккаунт';

    function attachAccountButton() {
      const existing = document.getElementById('accountBtnInjected');
      if (existing) return;
      accountBtn.id = 'accountBtnInjected';
      accountBtn.addEventListener('click', openAccountModal);
      tvScreen.appendChild(accountBtn);
    }

    function safeHaptic(type, level) {
      if (!tg || !tg.HapticFeedback) return;
      try {
        if (type === 'impact') tg.HapticFeedback.impactOccurred(level);
        if (type === 'notification') tg.HapticFeedback.notificationOccurred(level);
      } catch (e) {
        console.warn('Haptic feedback failed:', e);
      }
    }

    function openAccountModal() {
      document.getElementById('profileName').textContent = state.account.name;
      if (state.account.photo) {
        const avatar = document.getElementById('profileAvatar');
        avatar.style.backgroundImage = `url('${state.account.photo}')`;
        avatar.style.backgroundSize = 'cover';
        avatar.style.backgroundPosition = 'center';
        avatar.textContent = ''; // прячем смайлик, если есть фото
      }
      accountModal.classList.add('show');
      safeHaptic('impact', 'light');
    }

    function closeAccountModal() {
      accountModal.classList.remove('show');
    }

    document.getElementById('closeAccountModal').onclick = closeAccountModal;
    accountModal.addEventListener('click', (e) => {
      if (e.target === accountModal) closeAccountModal();
    });

    async function fetchQuiz() {
      const response = await fetch(QUIZ_API, {
        method: 'POST',
        headers: { 
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        mode: 'cors',
        body: JSON.stringify({})
      });

      if (!response.ok) {
        throw new Error(`Сервер вернул ошибку (HTTP ${response.status})`);
      }

      const contentType = response.headers.get('content-type');
      if (!contentType || !contentType.includes('application/json')) {
        throw new Error('Webhook вернул не JSON');
      }

      const data = await response.json();

      if (!data || !Array.isArray(data.questions) || !data.questions.length) {
        throw new Error('Webhook вернул пустой кинотест');
      }

      return data;
    }

    function setPreviewFromQuiz(quiz) {
      state.quiz = quiz;
      state.title = quiz.title || 'Твой случайный кинотест';
      state.description = quiz.description || 'Готово — тест подобран. Можно начинать.';
      state.previewImage = quiz.image || quiz.questions?.[0]?.image || quiz.questions?.[0]?.frame_url || FALLBACK_SCENE;
      state.error = '';
    }

    function resetRun() {
      state.currentQuestion = 0;
      state.answers = [];
      state.score = 0;
    }

    async function preloadQuiz() {
      if (state.loading) return;
      state.loading = true;
      state.error = '';
      render();

      try {
        const quiz = await fetchQuiz();
        setPreviewFromQuiz(quiz);
        safeHaptic('notification', 'success');
      } catch (error) {
        state.error = error.message || 'Ошибка загрузки кинотеста';
        safeHaptic('notification', 'error');
      } finally {
        state.loading = false;
        render();
      }
    }

    async function handleRandomQuiz() {
      if (state.loading) return;
      state.loading = true;
      state.error = '';
      render();

      try {
        const quiz = await fetchQuiz();
        setPreviewFromQuiz(quiz);
        state.screen = 'home';
        safeHaptic('impact', 'light');
      } catch (error) {
        state.error = error.message || 'Ошибка загрузки кинотеста';
        safeHaptic('notification', 'error');
      } finally {
        state.loading = false;
        render();
      }
    }

    async function handleStart() {
      if (state.loading) return;
      state.loading = true;
      state.error = '';
      render();

      try {
        if (!state.quiz) {
          const quiz = await fetchQuiz();
          setPreviewFromQuiz(quiz);
        }

        resetRun();
        state.screen = 'quiz';
        safeHaptic('notification', 'success');
      } catch (error) {
        state.error = error.message || 'Не удалось начать кинотест';
        safeHaptic('notification', 'error');
      } finally {
        state.loading = false;
        render();
      }
    }

    function handleAnswer(index) {
      if (state.loading || state.screen !== 'quiz') return;

      const question = state.quiz.questions[state.currentQuestion];
      const selected = question.options[index];
      const isCorrect = !!selected.correct;

      state.answers.push({
        questionId: question.id,
        selectedIndex: index,
        selectedText: selected.text || selected.title,
        correct: isCorrect
      });

      if (isCorrect) {
        state.score += 1;
        safeHaptic('notification', 'success');
      } else {
        safeHaptic('impact', 'medium');
      }

      const isLastQuestion = state.currentQuestion >= state.quiz.questions.length - 1;
      if (isLastQuestion) {
        state.screen = 'result';
        render();
        return;
      }

      state.currentQuestion += 1;
      render();
    }

    function handleRestart() {
      if (!state.quiz) {
        handleStart();
        return;
      }
      resetRun();
      state.screen = 'quiz';
      safeHaptic('notification', 'success');
      render();
    }

    function goHome() {
      state.screen = 'home';
      state.error = '';
      state.loading = false;
      render();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderHome() {
      const quizType = state.quiz ? Number(state.quiz.type) : 0;
      const isLandscape = quizType === 3 || quizType === 4;

      const errorBlock = state.error 
        ? `<p class="error-text">${escapeHtml(state.error)}</p><button class="retry-btn" onclick="preloadQuiz()">Повторить попытку</button>` 
        : '';

      if (state.loading) {
        tvScreen.innerHTML = `
          <p class="hand-note">Твой случайный кинотест</p>
          <p class="loading-text">Подбираем для тебя кинотест и загружаем его описание...</p>
          <div class="spinner" aria-hidden="true"></div>
          ${errorBlock}
        `;
      } else {
        tvScreen.innerHTML = `
          <p class="hand-note">Твой случайный кинотест</p>
          <h1 class="quiz-title">${escapeHtml(state.title)}</h1>
          <p class="quiz-description home-description">${escapeHtml(state.description)}</p>

          <div class="doodle home-doodle ${isLandscape ? 'home-doodle--landscape' : ''}">
            <img
              class="scene-photo ${isLandscape ? 'scene-photo--landscape' : ''}"
              src="${escapeHtml(state.previewImage)}"
              alt="Превью кинотеста"
              loading="eager"
              onerror="this.onerror=null;this.src='${FALLBACK_SCENE}'"
            />
          </div>
          ${errorBlock}
        `;
      }

      startButton.textContent = 'Начать';
      startButton.onclick = handleStart;
      startButton.disabled = state.loading || !state.quiz;
      randomButton.disabled = state.loading;
      tvControls.style.display = 'grid';
      
      attachAccountButton();
    }

    function renderQuiz() {
      const question = state.quiz.questions[state.currentQuestion];
      const progress = ((state.currentQuestion + 1) / state.quiz.questions.length) * 100;
      const quizType = Number(state.quiz.type);

      const questionTitle = quizType === 1
        ? 'Кто это на фото?'
        : quizType === 3 || quizType === 4
          ? 'Этот кадр из какого фильма?'
          : (question.question || 'Вопрос');

      const optionsHtml = quizType === 2
        ? question.options.map((option, index) => `
            <button class="option-btn option-btn--image" type="button" data-option-index="${index}">
              <img
                src="${escapeHtml(option.text || option.title || '')}"
                alt="Вариант ${index + 1}"
                class="option-image"
                loading="eager"
                onerror="this.onerror=null;this.src='${FALLBACK_SCENE}'"
              />
            </button>
          `).join('')
        : question.options.map((option, index) => `
            <button class="option-btn" type="button" data-option-index="${index}">
              ${escapeHtml(option.text || option.title || '')}
            </button>
          `).join('');

      tvScreen.innerHTML = `
        <button class="account-btn" id="accountBtnInjected" type="button" aria-label="Аккаунт" title="Аккаунт">
          <span>👤</span>
        </button>

        <div class="progress-row">
          <div class="progress-badge">Вопрос ${state.currentQuestion + 1} из ${state.quiz.questions.length}</div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-bar-fill" style="width:${progress}%"></div>
          </div>
        </div>

        <h2 class="quiz-title">${escapeHtml(questionTitle)}</h2>

        ${quizType === 1 || quizType === 3 || quizType === 4 ? `
          <div class="doodle ${(quizType === 3 || quizType === 4) ? 'question-doodle--landscape' : ''}">
            <img
              class="scene-photo ${(quizType === 3 || quizType === 4) ? 'scene-photo--landscape' : ''}"
              src="${escapeHtml(question.image || question.frame_url || FALLBACK_SCENE)}"
              alt="Вопрос ${state.currentQuestion + 1}"
              loading="eager"
              onerror="this.onerror=null;this.src='${FALLBACK_SCENE}'"
            />
          </div>
        ` : ''}

        <div class="question-options ${quizType === 2 ? 'question-options--images' : ''}">
          ${optionsHtml}
        </div>
      `;

      tvScreen.querySelectorAll('[data-option-index]').forEach((button) => {
        button.addEventListener('click', () => handleAnswer(Number(button.dataset.optionIndex)));
      });

      const injectedBtn = document.getElementById('accountBtnInjected');
      if (injectedBtn) injectedBtn.addEventListener('click', openAccountModal);

      tvControls.style.display = 'none';
    }

    function renderResult() {
      const total = state.quiz.questions.length;
      const percent = Math.round((state.score / total) * 100);

      let phrase = 'Хорошая попытка — следующий кинотест точно покорится тебе.';
      let moodClass = 'path-card--ok';

      if (percent === 100) {
        phrase = 'Идеально! Кинотест пройден без единой ошибки!';
        moodClass = 'path-card--super';
      } else if (percent >= 70) {
        phrase = 'Хороший результат! Ты отлично разбираешься в кинематографе!';
        moodClass = 'path-card--good';
      } else if (percent >= 40) {
        phrase = 'Неплохо! Но ты делаешь много ошибок, попробуй еще раз!';
        moodClass = 'path-card--ok';
      } else if (percent >= 20) {
        phrase = 'Кинотест провален. Думаю, что тебе стоит попробовать ещё раз!';
        moodClass = 'path-card--sad';
      } else {
        phrase = 'Почти всё мимо, но в этом и кайф — давай попробуем ещё раз!';
        moodClass = 'path-card--fail';
      }

      tvScreen.innerHTML = `
        <button class="account-btn" id="accountBtnInjected" type="button" aria-label="Аккаунт" title="Аккаунт">
          <span>👤</span>
        </button>

        <div class="result-wrap">
          <p class="hand-note">Финал кинотеста</p>
          <p class="result-text">${escapeHtml(phrase)}</p>

          <div class="path-visual">
            <div class="path-card ${moodClass}">
              <div class="path-start">
                <div class="path-start-line"></div>
              </div>

              <div class="path-dots">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
              </div>

              <div class="path-target">
                <div class="path-target-x"></div>
              </div>

              <div class="path-smile"></div>
            </div>
          </div>

          <div class="result-stats">
            <div class="result-chip">Правильных ответов: ${state.score} из ${total}</div>
            <div class="result-chip">Точность: ${percent}%</div>
          </div>
        </div>
      `;

      const injectedBtn = document.getElementById('accountBtnInjected');
      if (injectedBtn) injectedBtn.addEventListener('click', openAccountModal);

      tvControls.style.display = 'grid';
      startButton.textContent = 'Пройти ещё раз';
      startButton.onclick = handleRestart;
      startButton.disabled = false;
      randomButton.disabled = false;
    }

    function render() {
      if (state.screen === 'home') {
        renderHome();
        return;
      }
      if (state.screen === 'quiz' && state.quiz) {
        renderQuiz();
        return;
      }
      if (state.screen === 'result' && state.quiz) {
        renderResult();
        return;
      }
      goHome();
    }

    randomButton.addEventListener('click', handleRandomQuiz);
    startButton.addEventListener('click', handleStart);

    backButton.addEventListener('click', () => {
      if (document.getElementById('accountModal').classList.contains('show')) {
        closeAccountModal();
        return;
      }
      if (state.screen === 'quiz' || state.screen === 'result') {
        goHome();
        return;
      }
      if (window.history.length > 1) {
        window.history.back();
      } else if (tg) {
        tg.close();
      }
    });

    render();
    preloadQuiz();
  </script>
</body>
</html>
