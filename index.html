<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Случайный кинотест</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff6ea;
      --paper: #fffdf7;
      --paper-2: #fff1dc;
      --paper-tv: #f2dec0;
      --paper-tv-dark: #e3c597;
      --screen: #fffaf4;
      --ink: #4b2d1f;
      --muted: #8f6147;
      --accent: #f48a2a;
      --accent-dark: #db6c12;
      --line: #6b4028;
      --shadow: 0 10px 0 rgba(107, 64, 40, 0.12);
      --radius: 24px;
      --silhouette: #111111;
      --scene-bg-top: #f1ece5;
      --scene-bg-bottom: #ddd4c9;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 138, 42, 0.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 95, 0.22), transparent 18%),
        linear-gradient(180deg, #fff7ec 0%, #ffe8c9 100%);
      padding: 18px 14px 34px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card, .back-btn, .cta, .bottom-btn {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
    }

    .scribble::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 2px dashed rgba(107, 64, 40, 0.18);
      border-radius: calc(var(--radius) - 8px);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(4px, env(safe-area-inset-top));
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      font-weight: 800;
      color: var(--ink);
      background: var(--paper-2);
      cursor: pointer;
    }

    .back-btn:active,
    .cta:active,
    .bottom-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 0 rgba(107, 64, 40, 0.12);
    }

    .tv-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, var(--paper-tv) 0%, var(--paper-tv-dark) 100%);
      border-radius: 34px;
      box-shadow:
        0 12px 0 rgba(107, 64, 40, 0.14),
        0 22px 28px rgba(107, 64, 40, 0.08);
      position: relative;
      overflow: visible;
    }

    .tv-card::before,
    .tv-card::after {
      content: "";
      position: absolute;
      bottom: -14px;
      width: 58px;
      height: 10px;
      background: var(--line);
      border-radius: 999px;
      z-index: -1;
      opacity: 0.9;
    }

    .tv-card::before {
      left: 78px;
      transform: rotate(22deg);
    }

    .tv-card::after {
      right: 78px;
      transform: rotate(-22deg);
    }

    .tv-screen {
      position: relative;
      border: 3px solid var(--line);
      border-radius: 30px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.35),
        0 8px 0 rgba(107, 64, 40, 0.08);
      padding: 24px 16px 18px;
      min-height: 380px;
    }

    .tv-screen::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 2px dashed rgba(107, 64, 40, 0.18);
      border-radius: 22px;
      pointer-events: none;
    }

    .hand-note {
      position: relative;
      z-index: 1;
      font-family: 'Caveat', cursive;
      font-size: 36px;
      line-height: 1;
      color: var(--accent-dark);
      margin: 0 0 18px;
      transform: rotate(-2deg);
      text-align: center;
    }

    .quiz-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .quiz-description {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
      text-align: justify;
      text-justify: inter-word;
    }

    .doodle {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      padding: 0;
      background: linear-gradient(180deg, var(--scene-bg-top) 0%, var(--scene-bg-bottom) 100%);
      border: 3px solid rgba(107, 64, 40, 0.45);
      border-radius: 24px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25);
      overflow: hidden;
    }

    .doodle svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .tv-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border: 3px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .speaker {
      height: 44px;
      border-radius: 16px;
      border: 2px solid rgba(107, 64, 40, 0.28);
      background:
        radial-gradient(circle, rgba(107,64,40,0.35) 18%, transparent 19%) 0 0 / 8px 8px,
        #edd8b5;
    }

    .knobs {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .knob {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #ffd79f 0%, #f0b05d 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.38);
      position: relative;
      flex: 0 0 auto;
    }

    .knob.small {
      width: 24px;
      height: 24px;
    }

    .knob::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 11px;
      border-radius: 999px;
      background: var(--line);
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .knob.small::after {
      height: 8px;
      top: 3px;
    }

    .cta {
      width: 100%;
      padding: 18px 20px;
      background: var(--accent);
      color: #fffaf5;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      cursor: pointer;
    }

    .cta-wrap {
      padding: 2px;
    }

    .bottom-box {
      margin-top: 4px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    .bottom-btn {
      width: 100%;
      padding: 16px 18px;
      background: var(--paper-2);
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="back-btn scribble" id="backButton" type="button" aria-label="Вернуться">
        <span>←</span>
        <span>Вернуться</span>
      </button>
    </div>

    <section class="card tv-card" aria-label="Карточка кинотеста">
      <div class="tv-screen">
        <p class="hand-note">Твой случайный кинотест</p>
        <h1 class="quiz-title" id="quizTitle">Увлекательный тест по актрисам Франции</h1>
        <p class="quiz-description" id="quizDescription">Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.</p>

        <div class="doodle">
          <svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="0" width="360" height="200" fill="#e7e0d6"/>
            <rect x="0" y="150" width="360" height="50" fill="#d4c9bc"/>

            <rect x="234" y="10" width="3" height="140" fill="#9d9388"/>
            <rect x="249" y="10" width="2" height="140" fill="#b3a89b"/>
            <rect x="234" y="26" width="17" height="2.5" fill="#9d9388"/>
            <rect x="234" y="49" width="17" height="2.5" fill="#9d9388"/>
            <rect x="234" y="72" width="17" height="2.5" fill="#9d9388"/>
            <rect x="234" y="95" width="17" height="2.5" fill="#9d9388"/>
            <rect x="234" y="118" width="17" height="2.5" fill="#9d9388"/>

            <path d="M286 97H356" stroke="#b9aea2" stroke-width="5" stroke-linecap="round"/>
            <path d="M292 114H356" stroke="#c9beb2" stroke-width="4" stroke-linecap="round"/>

            <g transform="translate(10 14)">
              <path d="M26 41C26 28 35 17 48 14C61 11 72 18 75 31C76 39 73 46 69 52L70 60L39 61L40 50C31 47 26 45 26 41Z" fill="#111111"/>
              <path d="M38 61C43 57 51 56 58 58C68 61 75 68 79 77L93 114L78 115L67 88L60 86L62 156L48 156L46 96L42 117L28 148L17 143L31 108L36 78C37 71 38 66 38 61Z" fill="#111111"/>
              <path d="M50 156L43 184L31 184L39 156Z" fill="#111111"/>
              <path d="M62 156L73 184L61 184L54 156Z" fill="#111111"/>

              <g transform="translate(70 40)">
                <circle cx="38" cy="18" r="15" fill="#111111"/>
                <circle cx="61" cy="22" r="19" fill="#111111"/>
                <rect x="27" y="28" width="56" height="28" rx="4" fill="#111111"/>
                <path d="M83 35L108 31V55L83 50Z" fill="#111111"/>
                <rect x="19" y="48" width="10" height="23" rx="4" fill="#111111"/>
                <path d="M48 56V100" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
                <path d="M48 100L27 150" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
                <path d="M48 100L49 154" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
                <path d="M48 100L70 149" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
              </g>
            </g>

            <g transform="translate(263 20)">
              <path d="M24 37C24 23 33 13 46 10C58 7 67 13 71 25C73 33 72 43 65 49L67 56L37 56L38 49C29 47 24 43 24 37Z" fill="#111111"/>
              <path d="M41 56C53 55 61 59 67 68C72 75 75 87 76 102L84 145L72 147L61 116L58 166L44 166L41 120L28 165L16 163L25 121L28 97C29 84 32 73 36 66C38 62 39 59 41 56Z" fill="#111111"/>
              <path d="M44 166L39 190L28 190L35 166Z" fill="#111111"/>
              <path d="M58 166L66 190L55 190L50 166Z" fill="#111111"/>

              <path d="M0 94C9 89 14 86 18 84L21 98C14 101 9 103 2 107Z" fill="#111111"/>
              <path d="M18 84C24 84 28 86 32 90" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
            </g>

            <path d="M0 170C68 160 128 156 180 156C243 156 303 163 360 178" stroke="#b2a79b" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
          </svg>
        </div>
      </div>

      <div class="tv-controls" aria-hidden="true">
        <div class="speaker"></div>
        <div class="knobs">
          <span class="knob"></span>
          <span class="knob small"></span>
        </div>
      </div>
    </section>

    <div class="cta-wrap">
      <button class="cta scribble" id="startButton" type="button">Начать</button>
    </div>

    <div class="bottom-box">
      <button class="bottom-btn scribble" id="randomButton" type="button">🎲 Случайный кинотест</button>
    </div>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.MainButton.hide();

      tg.BackButton.onClick(() => {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          tg.close();
        }
      });
    }

    const state = {
      title: 'Увлекательный тест по актрисам Франции',
      description: 'Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.'
    };

    const titleEl = document.getElementById('quizTitle');
    const descriptionEl = document.getElementById('quizDescription');
    const randomButton = document.getElementById('randomButton');
    const startButton = document.getElementById('startButton');
    const backButton = document.getElementById('backButton');

    function render() {
      titleEl.textContent = state.title;
      descriptionEl.textContent = state.description;

      if (tg) {
        tg.MainButton.hide();
      }
    }

    function getRandomLocalQuiz() {
      const variants = [
        {
          title: 'Увлекательный тест по актерам США',
          description: 'Проверь, насколько хорошо ты узнаешь главных звезд Голливуда по фильмам, эпохам и ролям.'
        },
        {
          title: 'Увлекательный тест по актрисам России',
          description: 'Вспомни ярких актрис российского кино и узнай, насколько хорошо ты чувствуешь отечественный экран.'
        },
        {
          title: 'Увлекательный тест по актерам Скандинавии',
          description: 'Холодный север, мощная фактура и узнаваемые лица — попробуй пройти этот короткий кинотест без ошибок.'
        },
        {
          title: 'Увлекательный тест по актрисам Франции',
          description: 'Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.'
        }
      ];
      return variants[Math.floor(Math.random() * variants.length)];
    }

    randomButton.addEventListener('click', () => {
      Object.assign(state, getRandomLocalQuiz());
      render();
      if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    });

    function startQuiz() {
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      if (tg) {
        tg.sendData(JSON.stringify({ action: 'start_random_quiz', title: state.title }));
      } else {
        alert('Старт теста: ' + state.title);
      }
    }

    startButton.addEventListener('click', startQuiz);

    backButton.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else if (tg) {
        tg.close();
      }
    });

    render();
  </script>
</body>
</html>
