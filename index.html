<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Случайный кинотест</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff6ea;
      --paper: #fffdf7;
      --paper-2: #fff1dc;
      --paper-tv: #f2dec0;
      --paper-tv-dark: #e3c597;
      --screen: #fffaf4;
      --ink: #4b2d1f;
      --muted: #8f6147;
      --accent: #f48a2a;
      --accent-dark: #db6c12;
      --accent-soft: #ffd19d;
      --line: #6b4028;
      --shadow: 0 10px 0 rgba(107, 64, 40, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 138, 42, 0.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 95, 0.22), transparent 18%),
        linear-gradient(180deg, #fff7ec 0%, #ffe8c9 100%);
      padding: 18px 14px 34px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card, .back-btn, .cta, .bottom-btn {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
    }

    .scribble::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 2px dashed rgba(107, 64, 40, 0.18);
      border-radius: calc(var(--radius) - 8px);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(4px, env(safe-area-inset-top));
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      font-weight: 800;
      color: var(--ink);
      background: var(--paper-2);
      cursor: pointer;
    }

    .back-btn:active,
    .cta:active,
    .bottom-btn:active {
      transform: translateY(2px);
      box-shadow: 0 6px 0 rgba(107, 64, 40, 0.12);
    }

    .tv-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, var(--paper-tv) 0%, var(--paper-tv-dark) 100%);
      border-radius: 34px;
      box-shadow:
        0 12px 0 rgba(107, 64, 40, 0.14),
        0 22px 28px rgba(107, 64, 40, 0.08);
      position: relative;
      overflow: visible;
    }

    .tv-card::before,
    .tv-card::after {
      content: "";
      position: absolute;
      bottom: -14px;
      width: 58px;
      height: 10px;
      background: var(--line);
      border-radius: 999px;
      z-index: -1;
      opacity: 0.9;
    }

    .tv-card::before {
      left: 78px;
      transform: rotate(22deg);
    }

    .tv-card::after {
      right: 78px;
      transform: rotate(-22deg);
    }

    .tv-screen {
      position: relative;
      border: 3px solid var(--line);
      border-radius: 30px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.35),
        0 8px 0 rgba(107, 64, 40, 0.08);
      padding: 24px 16px 18px;
      min-height: 380px;
    }

    .tv-screen::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 2px dashed rgba(107, 64, 40, 0.18);
      border-radius: 22px;
      pointer-events: none;
    }

    .hand-note {
      position: relative;
      z-index: 1;
      font-family: 'Caveat', cursive;
      font-size: 36px;
      line-height: 1;
      color: var(--accent-dark);
      margin: 0 0 18px;
      transform: rotate(-2deg);
      text-align: center;
    }

    .quiz-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .quiz-description {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
      text-align: justify;
      text-justify: inter-word;
    }

    .doodle {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      padding: 14px;
      background: #f7eee5;
      border: 3px solid rgba(107, 64, 40, 0.45);
      border-radius: 24px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25);
    }

    .doodle svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .tv-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border: 3px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .speaker {
      height: 44px;
      border-radius: 16px;
      border: 2px solid rgba(107, 64, 40, 0.28);
      background:
        radial-gradient(circle, rgba(107,64,40,0.35) 18%, transparent 19%) 0 0 / 8px 8px,
        #edd8b5;
    }

    .knobs {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .knob {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, #ffd79f 0%, #f0b05d 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.38);
      position: relative;
      flex: 0 0 auto;
    }

    .knob.small {
      width: 24px;
      height: 24px;
    }

    .knob::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 11px;
      border-radius: 999px;
      background: var(--line);
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .knob.small::after {
      height: 8px;
      top: 3px;
    }

    .cta {
      width: 100%;
      padding: 18px 20px;
      background: var(--accent);
      color: #fffaf5;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      cursor: pointer;
    }

    .cta-wrap {
      padding: 2px;
    }

    .bottom-box {
      margin-top: 4px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    .bottom-btn {
      width: 100%;
      padding: 16px 18px;
      background: var(--paper-2);
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="back-btn scribble" id="backButton" type="button" aria-label="Вернуться">
        <span>←</span>
        <span>Вернуться</span>
      </button>
    </div>

    <section class="card tv-card" aria-label="Карточка кинотеста">
      <div class="tv-screen">
        <p class="hand-note">Твой случайный кинотест</p>
        <h1 class="quiz-title" id="quizTitle">Увлекательный тест по актрисам Франции</h1>
        <p class="quiz-description" id="quizDescription">Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.</p>

        <div class="doodle">
          <svg viewBox="0 0 320 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g>
              <circle cx="74" cy="30" r="12" fill="#6B4028"/>
              <path d="M58 44C61 37 67 34 74 34C81 34 87 37 90 44L95 66H53L58 44Z" fill="#6B4028"/>
              <path d="M60 66C66 74 82 74 88 66L94 104H54L60 66Z" fill="#6B4028"/>
              <path d="M64 104L58 116" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>
              <path d="M84 104L90 116" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>
            </g>

            <g>
              <circle cx="244" cy="30" r="12" fill="#6B4028"/>
              <path d="M228 44C232 37 237 34 244 34C251 34 257 37 260 44L265 66H223L228 44Z" fill="#6B4028"/>
              <rect x="228" y="66" width="32" height="38" rx="12" fill="#6B4028"/>
              <path d="M236 104L232 116" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>
              <path d="M252 104L256 116" stroke="#6B4028" stroke-width="5" stroke-linecap="round"/>
            </g>

            <g>
              <rect x="138" y="68" width="38" height="22" rx="5" fill="#FFD19D" stroke="#6B4028" stroke-width="3"/>
              <path d="M176 73L192 66V92L176 85V73Z" fill="#FFD19D" stroke="#6B4028" stroke-width="3" stroke-linejoin="round"/>
              <circle cx="150" cy="79" r="4" fill="#6B4028"/>
              <circle cx="164" cy="79" r="4" fill="#6B4028"/>
              <path d="M146 90L138 108" stroke="#6B4028" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M166 90L174 108" stroke="#6B4028" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M156 90V110" stroke="#6B4028" stroke-width="3.5" stroke-linecap="round"/>
            </g>

            <g>
              <path d="M110 82L126 76L124 90L110 82Z" fill="#F48A2A" stroke="#6B4028" stroke-width="3" stroke-linejoin="round"/>
              <path d="M126 78C131 79 135 82 138 86" stroke="#6B4028" stroke-width="3" stroke-linecap="round"/>
              <path d="M104 82C101 79 100 75 101 71" stroke="#6B4028" stroke-width="3" stroke-linecap="round"/>
            </g>

            <g>
              <circle cx="206" cy="86" r="13" fill="#FFD19D" stroke="#6B4028" stroke-width="3"/>
              <circle cx="206" cy="86" r="4" fill="#6B4028"/>
              <path d="M206 73V99" stroke="#6B4028" stroke-width="2"/>
              <path d="M193 86H219" stroke="#6B4028" stroke-width="2"/>
              <path d="M197 77L215 95" stroke="#6B4028" stroke-width="2"/>
              <path d="M215 77L197 95" stroke="#6B4028" stroke-width="2"/>
              <path d="M219 86C232 86 240 90 247 98" stroke="#6B4028" stroke-width="3" stroke-linecap="round"/>
            </g>

            <path d="M92 112C124 104 192 104 228 112" stroke="#6B4028" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="tv-controls" aria-hidden="true">
        <div class="speaker"></div>
        <div class="knobs">
          <span class="knob"></span>
          <span class="knob small"></span>
        </div>
      </div>
    </section>

    <div class="cta-wrap">
      <button class="cta scribble" id="startButton" type="button">Начать</button>
    </div>

    <div class="bottom-box">
      <button class="bottom-btn scribble" id="randomButton" type="button">🎲 Случайный кинотест</button>
    </div>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.MainButton.hide();

      tg.BackButton.onClick(() => {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          tg.close();
        }
      });
    }

    const state = {
      title: 'Увлекательный тест по актрисам Франции',
      description: 'Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.'
    };

    const titleEl = document.getElementById('quizTitle');
    const descriptionEl = document.getElementById('quizDescription');
    const randomButton = document.getElementById('randomButton');
    const startButton = document.getElementById('startButton');
    const backButton = document.getElementById('backButton');

    function render() {
      titleEl.textContent = state.title;
      descriptionEl.textContent = state.description;

      if (tg) {
        tg.MainButton.hide();
      }
    }

    function getRandomLocalQuiz() {
      const variants = [
        {
          title: 'Увлекательный тест по актерам США',
          description: 'Проверь, насколько хорошо ты узнаешь главных звезд Голливуда по фильмам, эпохам и ролям.'
        },
        {
          title: 'Увлекательный тест по актрисам России',
          description: 'Вспомни ярких актрис российского кино и узнай, насколько хорошо ты чувствуешь отечественный экран.'
        },
        {
          title: 'Увлекательный тест по актерам Скандинавии',
          description: 'Холодный север, мощная фактура и узнаваемые лица — попробуй пройти этот короткий кинотест без ошибок.'
        },
        {
          title: 'Увлекательный тест по актрисам Франции',
          description: 'Угадай известных актрис, связанных с французским кино, и проверь, насколько хорошо ты ориентируешься в европейском экране.'
        }
      ];
      return variants[Math.floor(Math.random() * variants.length)];
    }

    randomButton.addEventListener('click', () => {
      Object.assign(state, getRandomLocalQuiz());
      render();
      if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    });

    function startQuiz() {
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      if (tg) {
        tg.sendData(JSON.stringify({ action: 'start_random_quiz', title: state.title }));
      } else {
        alert('Старт теста: ' + state.title);
      }
    }

    startButton.addEventListener('click', startQuiz);

    backButton.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else if (tg) {
        tg.close();
      }
    });

    render();
  </script>
</body>
</html>
