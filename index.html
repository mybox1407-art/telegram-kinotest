<!DOCTYPE html>
<html lang="ru">
<head>

  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #fff6ea;
      --paper: #fffdf7;
      --paper-2: #fff1dc;
      --paper-tv: #f2dec0;
      --paper-tv-dark: #e3c597;
      --screen: #fffaf4;
      --ink: #4b2d1f;
      --muted: #8f6147;
      --accent: #f48a2a;
      --accent-dark: #db6c12;
      --line: #6b4028;
      --frame-dark: #654321;
      --success: #3d8a43;
      --danger: #b24a2a;
      --shadow: 0 10px 0 rgba(107, 64, 40, 0.12);
      --radius: 24px;
      --flat-color: #b27339;
      --flat-shadow: #78471c;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(244, 138, 42, 0.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 95, 0.22), transparent 18%),
        linear-gradient(180deg, #fff7ec 0%, #ffe8c9 100%);
      padding: 8px 14px 26px;
      display: flex;
      flex-direction: column;
    }

    .app {
      width: 100%;
      max-width: 430px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(0px, env(safe-area-inset-top));
    }

    .btn-3d {
      position: relative;
      background: var(--flat-color);
      border: none;
      color: #fffaf5;
      text-shadow: 0 2px 0 rgba(107, 64, 40, 0.4);
      cursor: pointer;
      overflow: visible;
      box-shadow:
        inset 0 0 0 1.5px rgba(255, 237, 214, 0.35),
        0 6px 0 var(--flat-shadow),
        0 10px 8px rgba(107, 64, 40, 0.2);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.1s;
      outline: none;
    }

    .btn-3d:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 0 0 1.5px rgba(255, 237, 214, 0.35),
        0 2px 0 var(--flat-shadow),
        0 4px 4px rgba(107, 64, 40, 0.2);
    }

    .btn-3d > * { position: relative; z-index: 2; }

    .tv-start-btn { width: 100%; height: 46px; border-radius: 16px; font-size: 24px; font-weight: 800; }
    .tv-random-btn { width: 46px; height: 46px; border-radius: 16px; }
    .back-btn { padding: 10px 16px; font-size: 14px; font-weight: 800; border-radius: 14px; gap: 8px; }
    .account-btn { position: absolute; top: 6px; right: 6px; width: 48px; height: 48px; z-index: 6; border-radius: 50%; padding: 0; }

    .back-btn-icon { width: 20px; height: 20px; flex: 0 0 20px; display: block; }
    .back-btn-icon path, .back-btn-icon polyline { stroke: #fffaf5; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; fill: none; }

    .tv-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, var(--paper-tv) 0%, var(--paper-tv-dark) 100%);
      border-radius: 34px;
      box-shadow: 0 12px 0 rgba(107, 64, 40, 0.14), 0 22px 28px rgba(107, 64, 40, 0.08);
      position: relative;
      overflow: visible;
    }

    .tv-screen {
      position: relative;
      border: 3px solid var(--line);
      border-radius: 30px;
      background: var(--screen);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.35), 0 8px 0 rgba(107, 64, 40, 0.08);
      padding: 12px 12px 8px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .hand-note {
      position: relative;
      z-index: 1;
      font-family: 'Caveat', cursive;
      font-size: 24px;
      line-height: 1;
      color: var(--flat-color);
      margin: 12px 0 10px;
      transform: rotate(-2deg);
      text-align: center;
    }

    .quiz-title {
      position: relative;
      z-index: 1;
      margin: 2px 0 0;
      font-family: 'Caveat', cursive;
      font-size: 34px;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 700;
      text-align: center;
    }

    .question-title {
      position: relative;
      z-index: 1;
      margin: 0 0 12px;
      font-family: 'Caveat', cursive;
      font-size: 28px;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 700;
      text-align: center;
    }

    .quiz-description {
      position: relative;
      z-index: 1;
      margin: 12px 0 0;
      font-size: 16px;
      line-height: 1.4;
      color: var(--ink);
      font-weight: 500;
      text-align: center;
    }

    .progress-row {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding-right: 56px;
    }

    .progress-badge {
      background: var(--flat-color);
      color: #fffaf5;
      text-shadow: 0 2px 0 rgba(107, 64, 40, 0.4);
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: inset 0 0 0 1.5px rgba(255, 237, 214, 0.35), 0 4px 0 var(--flat-shadow);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .progress-bar {
      flex: 1;
      height: 10px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #f7e6cc;
      overflow: hidden;
      min-width: 0;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--flat-color);
      transition: width 220ms ease;
    }

    .option-btn, .result-btn {
      width: 100%;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      text-align: left;
      justify-content: flex-start;
    }

    .option-btn--image { padding: 0; overflow: hidden; display: block; min-height: 94px; }
    .question-options--images .option-btn--image { min-height: 110px; }

    .tv-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 46px auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border: 3px solid var(--frame-dark);
      border-radius: 22px;
      background: linear-gradient(180deg, #f4dfbf 0%, #e8c99a 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
    }

    .cat-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .cat-name {
      text-align: center;
    }

    .cat-metrics {
      display: flex;
      gap: 6px;
      width: 100%;
      justify-content: center;
      padding-left: 0;
    }

    /* остальной CSS и JS без изменений */
  </style>
</head>
